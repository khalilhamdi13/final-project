apiVersion: tekton.dev/v1beta1
kind: Task
metadata:
  name: cleanup
spec:
  workspaces:
    - name: source
  steps:
    - name: cleanup
      image: alpine:3.20
      workingDir: $(workspaces.source.path)
      script: |
        #!/bin/sh
        echo "Cleaning workspace..."
        rm -rf ./* || true

---
apiVersion: tekton.dev/v1beta1
kind: Task
metadata:
  name: flake8
spec:
  workspaces:
    - name: source
  steps:
    - name: lint
      image: python:3.11
      workingDir: $(workspaces.source.path)
      script: |
        #!/bin/sh
        pip install -r requirements.txt
        flake8 . --exclude=venv

---
apiVersion: tekton.dev/v1beta1
kind: Task
metadata:
  name: test
spec:
  workspaces:
    - name: source
  steps:
    - name: nose-tests
      image: python:3.11
      workingDir: $(workspaces.source.path)
      script: |
        #!/bin/sh
        pip install -r requirements.txt
        nose2

---
apiVersion: tekton.dev/v1beta1
kind: Task
metadata:
  name: buildah
spec:
  steps:
    - name: build
      image: quay.io/buildah/stable
      script: |
        #!/bin/sh
        echo "Building image..."

---
apiVersion: tekton.dev/v1beta1
kind: Task
metadata:
  name: deploy
spec:
  steps:
    - name: deploy
      image: alpine:3.20
      script: |
        #!/bin/sh
        echo "Deploying application..."