apiVersion: tekton.dev/v1beta1
kind: Task
metadata:
  name: cleanup
spec:
  steps:
    - name: cleanup
      image: alpine
      script: |
        #!/bin/sh
        echo "Cleaning workspace"
        rm -rf /workspace/* || true

---

apiVersion: tekton.dev/v1beta1
kind: Task
metadata:
  name: nose-test
spec:
  steps:
    - name: nose-test
      image: python:3.11
      script: |
        #!/bin/sh
        pip install -r requirements.txt
        nose2